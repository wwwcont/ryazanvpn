services:
  node-agent:
    build:
      context: .
      args:
        SERVICE: cmd/node-agent
    restart: unless-stopped
    env_file: [.env]
    environment:
      NODE_AGENT_HTTP_ADDR: ${NODE_AGENT_HTTP_ADDR:-:8081}
      HTTP_ADDR: ${NODE_AGENT_HTTP_ADDR:-:8081}
      RUNTIME_ADAPTER: ${RUNTIME_ADAPTER:-amnezia_docker}
      DOCKER_BINARY_PATH: ${DOCKER_BINARY_PATH:-docker}
      AMNEZIA_CONTAINER_NAME: ${AMNEZIA_CONTAINER_NAME:?AMNEZIA_CONTAINER_NAME is required}
      AMNEZIA_INTERFACE_NAME: ${AMNEZIA_INTERFACE_NAME:?AMNEZIA_INTERFACE_NAME is required}
      XRAY_CONTAINER_NAME: ${XRAY_CONTAINER_NAME:?XRAY_CONTAINER_NAME is required}
    ports:
      - "8081:8081"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./deploy/node:/etc/ryazanvpn/node:rw
    networks:
      - backend

networks:
  backend:
    name: ${RYAZANVPN_SHARED_NETWORK:-ryazanvpn_shared}
