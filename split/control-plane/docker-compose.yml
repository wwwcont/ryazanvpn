services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: [.env]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - control_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - backend

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      - backend

  migrate:
    image: migrate/migrate:v4.17.1
    restart: "no"
    env_file: [.env]
    command: ["-path", "/migrations", "-database", "${POSTGRES_URL}", "up"]
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  control-plane:
    build:
      context: .
      args:
        SERVICE: cmd/control-plane
    restart: unless-stopped
    env_file: [.env]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    networks:
      - backend

  #caddy:
  #  image: caddy:2-alpine
  #  restart: unless-stopped
  #  env_file: [.env]
  #  ports:
  #    - "80:80"
  #    - "443:443"
  #  volumes:
  #    - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
  #    - control_caddy_data:/data
  #    - control_caddy_config:/config
  #  depends_on:
  #    - control-plane

volumes:
  control_postgres_data:
  #control_caddy_data:
  #control_caddy_config:

networks:
  backend:
    name: ${RYAZANVPN_SHARED_NETWORK:-ryazanvpn_shared}
