services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env.single.generated
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: migrate/migrate:v4.17.1
    restart: "no"
    command: ["-path", "/migrations", "-database", "${POSTGRES_URL}", "up"]
    volumes:
      - ./migrations:/migrations:ro
    env_file: [.env.single.generated]
    depends_on:
      postgres:
        condition: service_healthy

  control-plane:
    build:
      context: .
      args:
        SERVICE: cmd/control-plane
    restart: unless-stopped
    env_file: [.env.single.generated]
    environment:
      HTTP_ADDR: ${CONTROL_PLANE_HTTP_ADDR}
      CONTROL_PLANE_HTTP_ADDR: ${CONTROL_PLANE_HTTP_ADDR}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  amnezia-awg:
    image: ghcr.io/amnezia-vpn/amneziawg:latest
    container_name: ${AMNEZIA_CONTAINER_NAME:-amnezia-awg2}
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - single_amnezia_data:/var/lib/amnezia
      - ./deploy/node/amnezia:/etc/amnezia:rw
    healthcheck:
      test: ["CMD-SHELL", "awg show ${AMNEZIA_INTERFACE_NAME:-awg0} >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 5

  xray:
    image: teddysun/xray:latest
    container_name: ${XRAY_CONTAINER_NAME:-ryazanvpn-xray}
    restart: unless-stopped
    command: ["xray", "run", "-config", "/etc/xray/config.json"]
    volumes:
      - ./deploy/node/xray/config.json:/etc/xray/config.json:ro
      - single_xray_data:/var/lib/xray
      - single_xray_logs:/var/log/xray
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f xray >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 5

  node-agent:
    build:
      context: .
      args:
        SERVICE: cmd/node-agent
    restart: unless-stopped
    env_file: [.env.single.generated]
    environment:
      HTTP_ADDR: ${NODE_AGENT_HTTP_ADDR}
      NODE_AGENT_HTTP_ADDR: ${NODE_AGENT_HTTP_ADDR}
      DOCKER_BINARY_PATH: ${DOCKER_BINARY_PATH}
      RUNTIME_ADAPTER: ${RUNTIME_ADAPTER}
      AMNEZIA_CONTAINER_NAME: ${AMNEZIA_CONTAINER_NAME}
      AMNEZIA_INTERFACE_NAME: ${AMNEZIA_INTERFACE_NAME}
      XRAY_CONTAINER_NAME: ${XRAY_CONTAINER_NAME}
    ports:
      - "8081:8081"
    depends_on:
      amnezia-awg:
        condition: service_started
      xray:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro

volumes:
  postgres_data:
  single_amnezia_data:
  single_xray_data:
  single_xray_logs:
