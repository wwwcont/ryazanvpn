services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env.single.generated
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: migrate/migrate:v4.17.1
    restart: "no"
    command: ["-path", "/migrations", "-database", "${POSTGRES_URL}", "up"]
    volumes:
      - ./migrations:/migrations:ro
    env_file: [.env.single.generated]
    depends_on:
      postgres:
        condition: service_healthy

  control-plane:
    build:
      context: .
      args:
        SERVICE: cmd/control-plane
    restart: unless-stopped
    env_file: [.env.single.generated]
    environment:
      HTTP_ADDR: ${CONTROL_PLANE_HTTP_ADDR:-:8080}
      CONTROL_PLANE_HTTP_ADDR: ${CONTROL_PLANE_HTTP_ADDR:-:8080}
      CONFIG_MASTER_KEY: ${CONFIG_MASTER_KEY:?CONFIG_MASTER_KEY is required}
      VPN_SERVER_PUBLIC_KEY_FILE: /etc/amnezia/server.publickey
      AMNEZIA_RUNTIME_METADATA_PATH: /etc/amnezia/runtime-metadata.json
      XRAY_RUNTIME_METADATA_PATH: /etc/xray/runtime-metadata.json
      XRAY_REALITY_PUBLIC_KEY_FILE: /etc/xray/reality.publickey
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/node/amnezia:/etc/amnezia:ro
      - ./deploy/node/xray:/etc/xray:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  node-agent:
    build:
      context: .
      args:
        SERVICE: cmd/node-agent
    restart: unless-stopped
    env_file: [.env.single.generated]
    environment:
      HTTP_ADDR: ${NODE_AGENT_HTTP_ADDR:-:8081}
      NODE_AGENT_HTTP_ADDR: ${NODE_AGENT_HTTP_ADDR:-:8081}
      DOCKER_BINARY_PATH: ${DOCKER_BINARY_PATH:-docker}
      RUNTIME_ADAPTER: ${RUNTIME_ADAPTER:-amnezia_docker}
      AMNEZIA_CONTAINER_NAME: ${AMNEZIA_CONTAINER_NAME:?AMNEZIA_CONTAINER_NAME is required}
      AMNEZIA_INTERFACE_NAME: ${AMNEZIA_INTERFACE_NAME:?AMNEZIA_INTERFACE_NAME is required}
      XRAY_CONTAINER_NAME: ${XRAY_CONTAINER_NAME:?XRAY_CONTAINER_NAME is required}
    ports:
      - "8081:8081"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./deploy/node/amnezia:/etc/amnezia:ro
      - ./deploy/node/xray:/etc/xray:ro

volumes:
  postgres_data:
