services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env.single.generated
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: migrate/migrate:v4.17.1
    restart: "no"
    command: ["-path", "/migrations", "-database", "${POSTGRES_URL}", "up"]
    volumes:
      - ./migrations:/migrations:ro
    env_file: [.env.single.generated]
    depends_on:
      postgres:
        condition: service_healthy

  control-plane:
    build:
      context: .
      args:
        SERVICE: cmd/control-plane
    restart: unless-stopped
    env_file: [.env.single.generated]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  node-agent:
    build:
      context: .
      args:
        SERVICE: cmd/node-agent
    restart: unless-stopped
    env_file: [.env.single.generated]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: [.env.single.generated]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - control-plane

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
