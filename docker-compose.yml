services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ryazanvpn
      POSTGRES_USER: ryazan
      POSTGRES_PASSWORD: password1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ryazan -d ryazanvpn"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.1
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://ryazan:password1234@postgres:5432/ryazanvpn?sslmode=disable",
        "up",
      ]
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  control-plane:
    build:
      context: .
      args:
        SERVICE: cmd/control-plane
    environment:
      HTTP_ADDR: ":8080"
      POSTGRES_URL: "postgres://ryazan:password1234@postgres:5432/ryazanvpn?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_DB: "0"
      LOG_LEVEL: "info"
      SHUTDOWN_TIMEOUT: "15s"
      READINESS_TIMEOUT: "2s"
      NODE_AGENT_BASE_URL: "http://node-agent:8081"
      NODE_AGENT_HMAC_SECRET: "dev-node-agent-secret"
      NODE_AGENT_TIMEOUT: "5s"
      NODE_AGENT_RETRIES: "2"
      CONFIG_MASTER_KEY: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  node-agent:
    build:
      context: .
      args:
        SERVICE: cmd/node-agent
    environment:
      HTTP_ADDR: ":8081"
      LOG_LEVEL: "info"
      SHUTDOWN_TIMEOUT: "15s"
      READINESS_TIMEOUT: "2s"
      AGENT_HMAC_SECRET: "dev-node-agent-secret"
      AGENT_HMAC_MAX_SKEW: "5m"
    ports:
      - "8081:8081"

volumes:
  postgres_data:
