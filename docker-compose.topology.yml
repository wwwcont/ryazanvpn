services:
  amnezia-awg:
    build:
      context: .
      dockerfile: deploy/amneziawg-go/Dockerfile
    env_file: ["${ENV_FILE_PATH:-.env.single.generated}"]
    container_name: ${AMNEZIA_CONTAINER_NAME:-amnezia-awg2}
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - AMNEZIA_INTERFACE_NAME=${AMNEZIA_INTERFACE_NAME:?AMNEZIA_INTERFACE_NAME is required}
      - AMNEZIA_PORT=${AMNEZIA_PORT:?AMNEZIA_PORT is required}
      - AMNEZIA_SUBNET=${AMNEZIA_SUBNET:-10.8.1.0/24}
      - AMNEZIA_CONFIG_DIR=/etc/amnezia
      - AMNEZIA_KEEP_INTERFACE_UP=1
      - AMNEZIA_RUNTIME_METADATA_PATH=/etc/amnezia/runtime-metadata.json
      - AMNEZIA_PUBLIC_KEY_PATH=/etc/amnezia/server.publickey
    ports:
      - "${AMNEZIA_PORT:?AMNEZIA_PORT is required}:${AMNEZIA_PORT:?AMNEZIA_PORT is required}/udp"
    volumes:
      - topology_amnezia_data:/var/lib/amnezia
      - ./deploy/node/amnezia:/etc/amnezia:rw
    healthcheck:
      test: ["CMD-SHELL", "awg show ${AMNEZIA_INTERFACE_NAME:?AMNEZIA_INTERFACE_NAME is required} >/dev/null 2>&1 && [ -s /etc/amnezia/server.publickey ] && [ -s /etc/amnezia/runtime-metadata.json ]"]
      interval: 20s
      timeout: 5s
      retries: 5

  xray:
    image: teddysun/xray:1.8.24
    env_file: ["${ENV_FILE_PATH:-.env.single.generated}"]
    container_name: ${XRAY_CONTAINER_NAME:-ryazanvpn-xray}
    restart: unless-stopped
    command: ["sh", "-ceu", "/etc/xray/bootstrap.sh && exec xray run -config /etc/xray/config.json"]
    ports:
      - "${XRAY_REALITY_PORT:-8443}:${XRAY_REALITY_PORT:-8443}/tcp"
    volumes:
      - ./deploy/node/xray:/etc/xray:rw
      - topology_xray_data:/var/lib/xray
      - topology_xray_logs:/var/log/xray
    healthcheck:
      test: ["CMD-SHELL", "xray run -test -config /etc/xray/config.json >/dev/null 2>&1 && [ -s /etc/xray/reality.publickey ] && [ -s /etc/xray/runtime-metadata.json ]"]
      interval: 20s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: ["${ENV_FILE_PATH:-.env.single.generated}"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - topology_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--requirepass", "${REDIS_PASSWORD}"]

  migrate:
    image: migrate/migrate:v4.17.1
    restart: "no"
    command: ["-path", "/migrations", "-database", "${POSTGRES_URL}", "up"]
    volumes:
      - ./migrations:/migrations:ro
    env_file: ["${ENV_FILE_PATH:-.env.single.generated}"]
    depends_on:
      postgres:
        condition: service_healthy

  control-plane:
    build:
      context: .
      args:
        SERVICE: cmd/control-plane
    restart: unless-stopped
    env_file: ["${ENV_FILE_PATH:-.env.single.generated}"]
    environment:
      HTTP_ADDR: ${CONTROL_PLANE_HTTP_ADDR:-:8080}
      CONTROL_PLANE_HTTP_ADDR: ${CONTROL_PLANE_HTTP_ADDR:-:8080}
      CONFIG_MASTER_KEY: ${CONFIG_MASTER_KEY:?CONFIG_MASTER_KEY is required}
      VPN_SERVER_PUBLIC_KEY_FILE: /etc/amnezia/server.publickey
      AMNEZIA_RUNTIME_METADATA_PATH: /etc/amnezia/runtime-metadata.json
      XRAY_RUNTIME_METADATA_PATH: /etc/xray/runtime-metadata.json
      XRAY_REALITY_PUBLIC_KEY_FILE: /etc/xray/reality.publickey
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/node/amnezia:/etc/amnezia:ro
      - ./deploy/node/xray:/etc/xray:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  node-agent:
    build:
      context: .
      args:
        SERVICE: cmd/node-agent
    restart: unless-stopped
    env_file: ["${ENV_FILE_PATH:-.env.single.generated}"]
    environment:
      HTTP_ADDR: ${NODE_AGENT_HTTP_ADDR:-:8081}
      NODE_AGENT_HTTP_ADDR: ${NODE_AGENT_HTTP_ADDR:-:8081}
      DOCKER_BINARY_PATH: ${DOCKER_BINARY_PATH:-docker}
      RUNTIME_ADAPTER: ${RUNTIME_ADAPTER:-amnezia_docker}
      AMNEZIA_CONTAINER_NAME: ${AMNEZIA_CONTAINER_NAME:-amnezia-awg2}
      AMNEZIA_INTERFACE_NAME: ${AMNEZIA_INTERFACE_NAME:-awg0}
      XRAY_CONTAINER_NAME: ${XRAY_CONTAINER_NAME:-ryazanvpn-xray}
    ports:
      - "8081:8081"
    depends_on:
      amnezia-awg:
        condition: service_started
      xray:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./deploy/node/amnezia:/etc/amnezia:ro
      - ./deploy/node/xray:/etc/xray:ro

volumes:
  topology_postgres_data:
  topology_amnezia_data:
  topology_xray_data:
  topology_xray_logs:
